name: Build and Publish Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare version
        id: version
        run: |
          VERSION="v$(TZ=Asia/Shanghai date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: Build binary
        run: |
          mkdir -p build/release
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -tags=poll_opt -gcflags "all=-N -l" -ldflags "-X main.version=${VERSION}" -o build/release/automatic cmd/automatic/main.go

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
